<!-- @dsCard group="Depot" viewport="1380x900" name="App — Depósito de contenedores" subtitle="Panel, ingreso, inspección y tracking de reparación" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TankFlow — Depósito de contenedores</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--bg-app); }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--steel-700); border-radius: 999px; border: 2px solid var(--bg-app); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body style="background-color: rgb(61, 71, 86)">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="data.js"></script>

  <script type="text/babel" data-presets="react" src="shell.jsx"></script>
  <script type="text/babel" data-presets="react" src="Dashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="MyTasks.jsx"></script>
  <script type="text/babel" data-presets="react" src="Yard.jsx"></script>
  <script type="text/babel" data-presets="react" src="Intake.jsx"></script>
  <script type="text/babel" data-presets="react" src="Inspection.jsx"></script>
  <script type="text/babel" data-presets="react" src="Repairs.jsx"></script>
  <script type="text/babel" data-presets="react" src="ContainerDetail.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const [route, setRoute] = React.useState('dashboard');
      const [ctx, setCtx] = React.useState(null);
      const go = (r, payload) => { setRoute(r); if (payload !== undefined) setCtx(payload); };

      let screen;
      switch (route) {
        case 'intake': screen = <Intake go={go} />; break;
        case 'tasks': screen = <MyTasks go={go} />; break;
        case 'yard': screen = <Yard go={go} />; break;
        case 'inspection': screen = <Inspection go={go} />; break;
        case 'repairs': screen = <RepairForm go={go} container={ctx} />; break;
        case 'detail': screen = <ContainerDetail go={go} />; break;
        default: screen = <Dashboard go={go} />;
      }
      return <AppShell route={route} go={go}>{screen}</AppShell>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
