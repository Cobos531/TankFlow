<!-- @dsCard group="Colors" viewport="700x190" name="Marca — Azul señal" subtitle="Brand signal-blue scale & accent aliases" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-body); padding:20px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  .sw { flex:1 1 0; min-width:88px; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-subtle); }
  .chip { height:60px; }
  .meta { padding:8px 10px; background:var(--surface-card); }
  .tok { font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-secondary); }
  .hex { font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-muted); margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="tok">--blue-700</div><div class="hex">#0a6dbf</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="tok">--blue-600</div><div class="hex">#0e84db</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="tok">--blue-500 ◆</div><div class="hex">#1f9cf0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><div class="meta"><div class="tok">--blue-400</div><div class="hex">#44b4f7</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="meta"><div class="tok">--blue-300</div><div class="hex">#7fceff</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="tok">--blue-100</div><div class="hex">#d2ecff</div></div></div>
  </div>
</body>
</html>
