<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-display); padding:22px; }
  .big { font-size:48px; font-weight:700; letter-spacing:var(--ls-tight); line-height:1; }
  .sub { font-size:var(--text-xl); font-weight:500; color:var(--text-secondary); margin-top:10px; }
  .meta { font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-muted); margin-top:16px; }
</style>
</head>
<body>
  <div class="big">Depósito en control</div>
  <div class="sub">Patio · Inspección · Reparación</div>
  <div class="meta">Space Grotesk · 400 / 500 / 600 / 700 · var(--font-display)</div>
</body>
</html>
