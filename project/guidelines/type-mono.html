<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-mono); padding:22px; }
  .code { font-size:26px; font-weight:600; letter-spacing:0.04em; }
  .line { font-size:var(--text-base); color:var(--text-secondary); margin-top:10px; }
  .accent { color:var(--accent); }
  .meta { font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-muted); margin-top:16px; }
</style>
</head>
<body>
  <div class="code">MSKU 204418-7 · 40HC</div>
  <div class="line">GATE-IN <span class="accent">2026-06-12 08:41</span> · DÍAS EN PATIO 07</div>
  <div class="line">ORDEN #RP-1183 · REPUESTO ETA 2026-06-21</div>
  <div class="meta">IBM Plex Mono · 400 / 500 / 600 · var(--font-mono)</div>
</body>
</html>
