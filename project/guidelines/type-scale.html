<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-display); padding:20px; }
  .r { display:flex; align-items:baseline; gap:14px; padding:3px 0; border-bottom:1px solid var(--border-subtle); }
  .r span.s { font-weight:600; line-height:1.1; }
  .tok { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-left:auto; }
</style>
</head>
<body>
  <div class="r"><span class="s" style="font-size:52px">Aa</span><span class="tok">--text-5xl · 52</span></div>
  <div class="r"><span class="s" style="font-size:38px">Aa</span><span class="tok">--text-4xl · 38</span></div>
  <div class="r"><span class="s" style="font-size:30px">Aa</span><span class="tok">--text-3xl · 30</span></div>
  <div class="r"><span class="s" style="font-size:24px">Aa Bb</span><span class="tok">--text-2xl · 24</span></div>
  <div class="r"><span class="s" style="font-size:20px">Aa Bb Cc</span><span class="tok">--text-xl · 20</span></div>
  <div class="r"><span class="s" style="font-size:17px">Aa Bb Cc Dd</span><span class="tok">--text-lg · 17</span></div>
  <div class="r"><span class="s" style="font-size:14px">Aa Bb Cc Dd Ee</span><span class="tok">--text-base · 14</span></div>
  <div class="r"><span class="s" style="font-size:12px">Aa Bb Cc Dd Ee Ff</span><span class="tok">--text-xs · 12</span></div>
</body>
</html>
