<!-- @dsCard group="Colors" viewport="700x280" name="Neutros — Acero" subtitle="Steel/slate scale: backgrounds, surfaces, text" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-body); padding:20px; }
  .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
  .sw { border-radius:var(--radius-sm); overflow:hidden; border:1px solid var(--border-subtle); }
  .chip { height:46px; }
  .meta { padding:6px 7px; background:var(--surface-card); }
  .tok { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); }
  .hex { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-top:1px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--steel-950)"></div><div class="meta"><div class="tok">950</div><div class="hex">#080b12</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-900)"></div><div class="meta"><div class="tok">900</div><div class="hex">#0e131d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-850)"></div><div class="meta"><div class="tok">850</div><div class="hex">#151b28</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-800)"></div><div class="meta"><div class="tok">800</div><div class="hex">#1b2230</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-700)"></div><div class="meta"><div class="tok">700</div><div class="hex">#2b3546</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-600)"></div><div class="meta"><div class="tok">600</div><div class="hex">#475264</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-500)"></div><div class="meta"><div class="tok">500</div><div class="hex">#5d6a7e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-400)"></div><div class="meta"><div class="tok">400</div><div class="hex">#7e8da1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-300)"></div><div class="meta"><div class="tok">300</div><div class="hex">#a6b2c2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-200)"></div><div class="meta"><div class="tok">200</div><div class="hex">#c9d2de</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-100)"></div><div class="meta"><div class="tok">100</div><div class="hex">#e6ebf1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--steel-050)"></div><div class="meta"><div class="tok">050</div><div class="hex">#f4f7fa</div></div></div>
  </div>
</body>
</html>
