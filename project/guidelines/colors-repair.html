<!-- @dsCard group="Colors" viewport="700x170" name="Tipos de reparación" subtitle="5 categorías: estructural, interior, rotulación, pintura, regulatoria" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-body); padding:20px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-subtle); }
  .chip { height:44px; }
  .meta { padding:8px 10px; background:var(--surface-card); }
  .name { font-size:var(--text-2xs); font-weight:var(--fw-semibold); }
  .tok { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--rep-estructural)"></div><div class="meta"><div class="name">Estructural</div><div class="tok">--rep-estructural</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rep-interior)"></div><div class="meta"><div class="name">Interior</div><div class="tok">--rep-interior</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rep-rotulacion)"></div><div class="meta"><div class="name">Rotulación</div><div class="tok">--rep-rotulacion</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rep-pintura)"></div><div class="meta"><div class="name">Pintura</div><div class="tok">--rep-pintura</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rep-regulatoria)"></div><div class="meta"><div class="name">Insp. regulatoria</div><div class="tok">--rep-regulatoria</div></div></div>
  </div>
</body>
</html>
