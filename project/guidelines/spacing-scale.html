<!-- @dsCard group="Spacing" viewport="700x180" name="Escala de espaciado" subtitle="Base 8px — tokens --space-*" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-body); padding:22px; }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .item { text-align:center; }
  .bar { background:var(--accent); border-radius:var(--radius-xs); width:22px; }
  .tok { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-top:6px; }
  .px { font-family:var(--font-mono); font-size:11px; color:var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="tok">1</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="tok">2</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="tok">3</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="tok">4</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="tok">6</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="tok">8</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="tok">12</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="tok">16</div></div>
  </div>
</body>
</html>
