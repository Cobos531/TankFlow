<!-- @dsCard group="Components" viewport="700x340" name="Datos & estado" subtitle="StatusBadge · RepairTag · AgingIndicator · StatCard" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-body); padding:22px; }
  .stack { display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .cap { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
  .agingrow { display:flex; gap:28px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script type="text/babel">
    const { StatusBadge, RepairTag, AgingIndicator, StatCard } = window.TankFlowDesignSystem_32ec47;
    const I = (n) => <i data-lucide={n}></i>;
    function Demo() {
      return (
        <div className="stack">
          <div>
            <div className="cap">StatusBadge — ciclo de vida</div>
            <div className="row">
              <StatusBadge status="inspeccion-pendiente" />
              <StatusBadge status="reparacion-pendiente" />
              <StatusBadge status="en-reparacion" />
              <StatusBadge status="disponible" />
            </div>
          </div>
          <div>
            <div className="cap">RepairTag — 5 categorías</div>
            <div className="row">
              <RepairTag type="estructural" />
              <RepairTag type="interior" />
              <RepairTag type="rotulacion" />
              <RepairTag type="pintura" />
              <RepairTag type="regulatoria" />
            </div>
          </div>
          <div>
            <div className="cap">AgingIndicator — escalado por días</div>
            <div className="agingrow">
              <AgingIndicator days={7} />
              <AgingIndicator days={21} />
              <AgingIndicator days={38} />
            </div>
          </div>
          <div>
            <div className="cap">StatCard</div>
            <div className="grid3">
              <StatCard label="En patio" value="142" icon={I('container')} delta="8 hoy" deltaDir="up" />
              <StatCard label="En reparación" value="57" variant="accent" icon={I('wrench')} note="32 esperando repuesto" />
              <StatCard label="+30 días" value="11" variant="critical" icon={I('clock-alert')} note="sin terminar" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    setTimeout(() => window.lucide && lucide.createIcons({ attrs: { 'stroke-width': 1.75 } }), 60);
  </script>
</body>
</html>
