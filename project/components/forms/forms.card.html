<!-- @dsCard group="Components" viewport="700x300" name="Formularios" subtitle="Button · IconButton · Input · Select · Switch" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg-app); color:var(--text-primary); font-family:var(--font-body); padding:22px; }
  .stack { display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:520px; }
  .cap { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script type="text/babel">
    const { Button, IconButton, Input, Select, Switch } = window.TankFlowDesignSystem_32ec47;
    const I = (n) => <i data-lucide={n}></i>;
    function Demo() {
      return (
        <div className="stack">
          <div>
            <div className="cap">Button — variantes</div>
            <div className="row">
              <Button iconLeft={I('log-in')}>Registrar ingreso</Button>
              <Button variant="secondary">Secundario</Button>
              <Button variant="ghost">Ghost</Button>
              <Button variant="success">Marcar listo</Button>
              <Button variant="danger">Crítico</Button>
              <Button disabled>Disabled</Button>
            </div>
          </div>
          <div>
            <div className="cap">Tamaños · IconButton</div>
            <div className="row">
              <Button size="sm">Small</Button>
              <Button size="md">Medium</Button>
              <Button size="lg">Large</Button>
              <IconButton aria-label="filtros">{I('sliders-horizontal')}</IconButton>
              <IconButton active aria-label="activo">{I('container')}</IconButton>
              <IconButton variant="ghost" aria-label="más">{I('more-vertical')}</IconButton>
            </div>
          </div>
          <div>
            <div className="cap">Input · Select · Switch</div>
            <div className="grid2">
              <Input label="Código ISO" mono placeholder="MSKU 204418-7" icon={I('container')} />
              <Select label="Tipo de reparación" placeholder="Seleccionar…" options={['Estructural','Interior','Rotulación','Pintura','Inspección regulatoria']} />
            </div>
            <div className="row" style={{marginTop:'14px'}}>
              <Switch label="Solo equipos en alerta" defaultChecked />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    setTimeout(() => window.lucide && lucide.createIcons({ attrs: { 'stroke-width': 1.75 } }), 60);
  </script>
</body>
</html>
