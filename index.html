<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TankFlow — Depósito de contenedores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--steel-700); border-radius: 999px; border: 2px solid var(--bg-app); }
::-webkit-scrollbar-track { background: transparent; }

:root {
  --steel-950: #080b12;
  --steel-900: #0e131d;
  --steel-880: #121828;
  --steel-850: #151b28;
  --steel-800: #1b2230;
  --steel-750: #222b3b;
  --steel-700: #2b3546;
  --steel-650: #364154;
  --steel-600: #475264;
  --steel-500: #5d6a7e;
  --steel-400: #7e8da1;
  --steel-300: #a6b2c2;
  --steel-200: #c9d2de;
  --steel-100: #e6ebf1;
  --steel-050: #f4f7fa;
  --blue-700: #0a6dbf;
  --blue-600: #0e84db;
  --blue-500: #1f9cf0;
  --blue-400: #44b4f7;
  --blue-300: #7fceff;
  --blue-100: #d2ecff;
  --blue-950: #0a2238;
  --green-500: #2dd4a0;
  --green-400: #4ee0b4;
  --green-950: #07261d;
  --amber-500: #f5a623;
  --amber-400: #ffbb47;
  --amber-950: #2c1d04;
  --red-500: #f4503e;
  --red-400: #ff6e5e;
  --red-950: #2c0c08;
  --rep-estructural: #f9685a;
  --rep-interior: #2dd4bf;
  --rep-rotulacion: #f5b531;
  --rep-pintura: #5b9df9;
  --rep-regulatoria: #a78bfa;
  --bg-app: var(--steel-900);
  --bg-sunken: var(--steel-880);
  --surface-card: var(--steel-850);
  --surface-raised: var(--steel-800);
  --surface-hover: var(--steel-750);
  --border-subtle: rgba(255,255,255,0.06);
  --border-default: rgba(255,255,255,0.10);
  --border-strong: var(--steel-700);
  --text-primary: var(--steel-050);
  --text-secondary: var(--steel-300);
  --text-muted: var(--steel-500);
  --text-inverse: var(--steel-950);
  --accent: var(--blue-500);
  --accent-hover: var(--blue-400);
  --accent-quiet: var(--blue-950);
  --status-ok: var(--green-500);
  --status-warn: var(--amber-500);
  --status-critical: var(--red-500);
  --focus-ring: rgba(31,156,240,0.55);
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'IBM Plex Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;
  --text-2xs: 11px;
  --text-xs: 12px;
  --text-sm: 13px;
  --text-base: 14px;
  --text-md: 15px;
  --text-lg: 17px;
  --text-xl: 20px;
  --text-2xl: 24px;
  --text-3xl: 30px;
  --text-4xl: 38px;
  --text-5xl: 52px;
  --fw-regular: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
  --fw-bold: 700;
  --lh-tight: 1.1;
  --lh-snug: 1.3;
  --lh-normal: 1.5;
  --ls-tight: -0.02em;
  --ls-normal: 0;
  --ls-wide: 0.04em;
  --ls-caps: 0.08em;
  --sidebar-w: 244px;
  --topbar-h: 60px;
  --content-max: 1440px;
  --gutter: 24px;
  --radius-xs: 3px;
  --radius-sm: 5px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-pill: 999px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.40);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.50);
  --shadow-pop: 0 16px 48px rgba(0,0,0,0.60);
  --glow-accent: 0 0 0 1px rgba(31,156,240,0.35), 0 0 16px rgba(31,156,240,0.18);
  --border-w: 1px;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 120ms;
  --dur-base: 180ms;
  --dur-slow: 280ms;
}

/* Button */
.tf-btn {
  --_bg: var(--accent); --_fg: #06121d;
  font-family: var(--font-body); font-weight: var(--fw-semibold); font-size: var(--text-base);
  line-height: 1; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  border: 1px solid transparent; border-radius: var(--radius-md); padding: 0 16px; height: 38px;
  cursor: pointer; white-space: nowrap; background: var(--_bg); color: var(--_fg);
  transition: background var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
}
.tf-btn:hover { background: var(--accent-hover); }
.tf-btn:active { transform: translateY(1px); }
.tf-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--focus-ring); }
.tf-btn[disabled] { opacity: 0.45; cursor: not-allowed; transform: none; }
.tf-btn--secondary { --_bg: var(--surface-raised); --_fg: var(--text-primary); border-color: var(--border-strong); }
.tf-btn--secondary:hover { background: var(--surface-hover); }
.tf-btn--ghost { --_bg: transparent; --_fg: var(--text-secondary); }
.tf-btn--ghost:hover { background: var(--surface-hover); color: var(--text-primary); }
.tf-btn--danger { --_bg: var(--red-500); --_fg: #2c0c08; }
.tf-btn--danger:hover { background: var(--red-400); }
.tf-btn--success { --_bg: var(--green-500); --_fg: #07261d; }
.tf-btn--success:hover { background: var(--green-400); }
.tf-btn--sm { height: 30px; font-size: var(--text-sm); padding: 0 12px; border-radius: var(--radius-sm); }
.tf-btn--lg { height: 46px; font-size: var(--text-md); padding: 0 22px; }
.tf-btn--block { width: 100%; }

/* IconButton */
.tf-iconbtn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: var(--radius-md);
  border: 1px solid var(--border-default); background: var(--surface-raised); color: var(--text-secondary);
  cursor: pointer; transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
}
.tf-iconbtn:hover { background: var(--surface-hover); color: var(--text-primary); }
.tf-iconbtn:active { transform: translateY(1px); }
.tf-iconbtn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--focus-ring); }
.tf-iconbtn[disabled] { opacity: 0.45; cursor: not-allowed; }
.tf-iconbtn--ghost { background: transparent; border-color: transparent; }
.tf-iconbtn--ghost:hover { background: var(--surface-hover); }
.tf-iconbtn--sm { width: 30px; height: 30px; border-radius: var(--radius-sm); }
.tf-iconbtn--active { color: var(--accent); border-color: var(--accent); background: var(--accent-quiet); }

/* Input */
.tf-field { display: flex; flex-direction: column; gap: 6px; }
.tf-field__label { font-size: var(--text-xs); font-weight: var(--fw-medium); color: var(--text-secondary); }
.tf-field__hint { font-size: var(--text-2xs); color: var(--text-muted); }
.tf-field__hint--error { color: var(--red-400); }
.tf-input {
  font-family: var(--font-body); font-size: var(--text-base); color: var(--text-primary);
  background: var(--bg-sunken); border: 1px solid var(--border-default); border-radius: var(--radius-md);
  height: 38px; padding: 0 12px; width: 100%; box-sizing: border-box;
  transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);
}
.tf-input::placeholder { color: var(--text-muted); }
.tf-input:hover { border-color: var(--border-strong); }
.tf-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
.tf-input--mono { font-family: var(--font-mono); letter-spacing: 0.03em; }
.tf-input--error { border-color: var(--red-500); }
.tf-input[disabled] { opacity: 0.5; cursor: not-allowed; }
.tf-input__wrap { position: relative; display: flex; align-items: center; }
.tf-input__icon { position: absolute; left: 11px; color: var(--text-muted); display: inline-flex; pointer-events: none; }
.tf-input__wrap--icon .tf-input { padding-left: 36px; }

/* Select */
.tf-select-field { display: flex; flex-direction: column; gap: 6px; }
.tf-select-field__label { font-size: var(--text-xs); font-weight: var(--fw-medium); color: var(--text-secondary); }
.tf-select__wrap { position: relative; display: flex; align-items: center; }
.tf-select {
  appearance: none; font-family: var(--font-body); font-size: var(--text-base);
  color: var(--text-primary); background: var(--bg-sunken); border: 1px solid var(--border-default);
  border-radius: var(--radius-md); height: 38px; padding: 0 36px 0 12px; width: 100%;
  box-sizing: border-box; cursor: pointer;
  transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);
}
.tf-select:hover { border-color: var(--border-strong); }
.tf-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
.tf-select[disabled] { opacity: 0.5; cursor: not-allowed; }
.tf-select__chevron { position: absolute; right: 12px; color: var(--text-muted); pointer-events: none; font-size: 11px; }

/* Switch */
.tf-switch { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
.tf-switch__track {
  position: relative; width: 38px; height: 22px; border-radius: var(--radius-pill);
  background: var(--steel-700); transition: background var(--dur-base) var(--ease-out); flex: none;
}
.tf-switch__thumb {
  position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%;
  background: var(--steel-100); transition: transform var(--dur-base) var(--ease-out); box-shadow: var(--shadow-sm);
}
.tf-switch input { position: absolute; opacity: 0; width: 0; height: 0; }
.tf-switch input:checked + .tf-switch__track { background: var(--accent); }
.tf-switch input:checked + .tf-switch__track .tf-switch__thumb { transform: translateX(16px); }
.tf-switch input:focus-visible + .tf-switch__track { box-shadow: 0 0 0 3px var(--focus-ring); }
.tf-switch__label { font-size: var(--text-base); color: var(--text-primary); }
.tf-switch--disabled { opacity: 0.5; cursor: not-allowed; }

/* Card */
.tf-card { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; }
.tf-card--raised { background: var(--surface-raised); box-shadow: var(--shadow-md); }
.tf-card--flush { border-radius: 0; border-left: 0; border-right: 0; }
.tf-card__header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border-subtle); }
.tf-card__title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: var(--fw-semibold); color: var(--text-primary); letter-spacing: var(--ls-tight); }
.tf-card__body { padding: 18px; }
.tf-card__body--flush { padding: 0; }

/* SectionHeader */
.tf-secthead { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
.tf-secthead__left { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.tf-secthead__eyebrow { font-family: var(--font-mono); font-size: var(--text-2xs); font-weight: var(--fw-medium); color: var(--accent); text-transform: uppercase; letter-spacing: var(--ls-caps); }
.tf-secthead__title { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: var(--fw-bold); color: var(--text-primary); letter-spacing: var(--ls-tight); line-height: 1.1; }
.tf-secthead__sub { font-size: var(--text-sm); color: var(--text-muted); }
.tf-secthead__actions { display: flex; align-items: center; gap: 8px; flex: none; }

/* StatusBadge */
.tf-badge {
  display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body);
  font-size: var(--text-2xs); font-weight: var(--fw-semibold); line-height: 1;
  letter-spacing: var(--ls-wide); text-transform: uppercase; padding: 5px 9px;
  border-radius: var(--radius-pill); border: 1px solid transparent; white-space: nowrap;
}
.tf-badge__dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex: none; }
.tf-badge--neutral  { color: var(--steel-300); background: rgba(166,178,194,0.10); border-color: rgba(166,178,194,0.22); }
.tf-badge--info     { color: var(--blue-300);  background: rgba(31,156,240,0.12);  border-color: rgba(31,156,240,0.30); }
.tf-badge--ok       { color: var(--green-400); background: rgba(45,212,160,0.12);  border-color: rgba(45,212,160,0.30); }
.tf-badge--warn     { color: var(--amber-400); background: rgba(245,166,35,0.14);  border-color: rgba(245,166,35,0.32); }
.tf-badge--critical { color: rgb(248,113,98);  background: rgba(244,80,62,0.14);   border-color: rgba(244,80,62,0.34); }
.tf-badge--solid-critical { color: #2c0c08; background: var(--red-500); border-color: var(--red-500); }

/* AgingIndicator */
.tf-aging { display: flex; flex-direction: column; gap: 5px; min-width: 92px; }
.tf-aging__top { display: flex; align-items: baseline; gap: 5px; }
.tf-aging__days { font-family: var(--font-mono); font-size: var(--text-md); font-weight: var(--fw-semibold); line-height: 1; }
.tf-aging__unit { font-size: var(--text-2xs); color: var(--text-muted); }
.tf-aging__bar { height: 4px; border-radius: var(--radius-pill); background: var(--steel-700); overflow: hidden; }
.tf-aging__fill { height: 100%; border-radius: var(--radius-pill); transition: width var(--dur-slow) var(--ease-out); }
.tf-aging--ok   .tf-aging__days { color: var(--green-400); }
.tf-aging--ok   .tf-aging__fill { background: var(--green-500); }
.tf-aging--warn .tf-aging__days { color: var(--amber-400); }
.tf-aging--warn .tf-aging__fill { background: var(--amber-500); }
.tf-aging--crit .tf-aging__days { color: var(--red-400); }
.tf-aging--crit .tf-aging__fill { background: var(--red-500); }
.tf-aging__flag { display: inline-flex; align-items: center; gap: 4px; font-size: var(--text-2xs); color: var(--red-400); font-weight: var(--fw-medium); }

/* RepairTag */
.tf-reptag {
  display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body);
  font-size: var(--text-xs); font-weight: var(--fw-medium); line-height: 1;
  padding: 5px 10px 5px 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-default); background: var(--surface-raised);
  color: var(--text-primary); white-space: nowrap;
}
.tf-reptag__swatch { width: 9px; height: 9px; border-radius: 2px; flex: none; }

/* StatCard */
.tf-stat {
  background: var(--surface-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: 16px 18px;
  display: flex; flex-direction: column; gap: 10px; min-width: 0;
}
.tf-stat__head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.tf-stat__label { font-size: var(--text-xs); font-weight: var(--fw-medium); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--ls-wide); }
.tf-stat__icon { display: inline-flex; color: var(--text-muted); }
.tf-stat__value { font-family: var(--font-display); font-size: var(--text-4xl); font-weight: var(--fw-bold); line-height: 1; letter-spacing: var(--ls-tight); color: var(--text-primary); }
.tf-stat__value sub { font-family: var(--font-body); font-size: var(--text-base); font-weight: var(--fw-medium); color: var(--text-muted); vertical-align: baseline; margin-left: 4px; }
.tf-stat__foot { display: flex; align-items: center; gap: 6px; font-size: var(--text-xs); }
.tf-stat__delta--up { color: var(--green-400); }
.tf-stat__delta--down { color: var(--red-400); }
.tf-stat__delta--flat { color: var(--text-muted); }
.tf-stat__note { color: var(--text-muted); }
.tf-stat--accent { border-color: rgba(31,156,240,0.30); box-shadow: var(--glow-accent); }
.tf-stat--critical { border-color: rgba(244,80,62,0.34); }
.tf-stat--critical .tf-stat__value { color: var(--red-400); }
</style>
</head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>

  const byRepair = [
    { type: 'estructural', label: 'Estructural', value: 24 },
    { type: 'interior', label: 'Interior', value: 12 },
    { type: 'rotulacion', label: 'Rotulación', value: 9 },
    { type: 'pintura', label: 'Pintura', value: 8 },
    { type: 'regulatoria', label: 'Insp. regulatoria', value: 4 },
  ];
  const timeline = [
    { icon: 'log-in', title: 'Ingreso al patio (Gate-in)', time: '2026-06-12 08:41', who: 'M. Ferreyra', done: true, note: 'Posición asignada B3-14' },
    { icon: 'clipboard-check', title: 'Inspección completada', time: '2026-06-12 11:20', who: 'J. Cáceres', done: true, note: 'Daño en panel lateral derecho' },

      </div>
    </div>
  );
}

function MyTasks({ go }) {
  const D = window.TF_DATA;
  const me = D.currentUser;
  const mine = D.containers.filter((c) => c.operador === me.name && c.status !== 'disponible');
  const groups = GROUPS
    .map((g) => ({ ...g, items: mine.filter((c) => c.status === g.status).sort((a, b) => b.daysInStatus - a.daysInStatus) }))
    .filter((g) => g.items.length > 0);
  const total = mine.length;
  const critical = mine.filter((c) => c.daysInStatus >= 30).length;
  const repuesto = mine.filter((c) => c.status === 'reparacion-pendiente').length;

  return (
    <div>
      <SectionHeader
        eyebrow={`Sesión · ${me.role}`}
        title="Mis tareas"
        subtitle={`${me.name} · equipos que esperan una acción tuya`}
        actions={<Button variant="secondary" size="md" iconLeft={<Icon name="container" />} onClick={() => go('yard')}>Ver todo el patio</Button>}
      />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '16px', marginBottom: 24 }}>
        <StatCard label="Tareas asignadas" value={String(total)} variant="accent" icon={<Icon name="list-checks" />} note="esperan tu acción" />
        <StatCard label="Reparación pendiente" value={String(repuesto)} icon={<Icon name="package-search" />} note="iniciar trabajo" />
        <StatCard label="+30 días en reparación" value={String(critical)} variant="critical" icon={<Icon name="clock-alert" />} note="prioridad alta" />
      </div>
      {groups.length === 0 ? (
        <Card>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, padding: '40px 0', textAlign: 'center' }}>
            <Icon name="check-check" size={34} color="var(--green-400)" />
            <div style={{ color: 'var(--text-secondary)' }}>No tenés tareas pendientes. Todo al día.</div>
          </div>
        </Card>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          {groups.map((g) => (
            <Card key={g.status} bodyFlush
              title={<span style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                <Icon name={g.icon} size={18} color={g.status === 'reparacion-pendiente' ? 'var(--amber-400)' : 'var(--blue-300)'} />
                {g.title}
              </span>}
              actions={<span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', background: 'var(--surface-raised)', padding: '2px 9px', borderRadius: 'var(--radius-pill)' }}>{g.items.length}</span>}
            >
              {g.items.map((c, i) => (
                <TaskRow key={c.id} c={c} action={g.action} go={go} last={i === g.items.length - 1} />
              ))}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

Object.assign(window, { MyTasks });
})();
</script>

<script type="text/babel" data-presets="react">
;(function(){
const { Card, SectionHeader, StatusBadge, RepairTag, AgingIndicator, Button, IconButton, Input, Select, Switch } = window.TankFlowDesignSystem_32ec47;

const ACTION = {
  'inspeccion-pendiente': { label: 'Inspeccionar', icon: 'clipboard-check', route: 'inspection', variant: 'primary' },
  'reparacion-pendiente': { label: 'Ver orden',    icon: 'wrench',          route: 'detail',     variant: 'secondary' },
  'en-reparacion':        { label: 'Ver orden',    icon: 'wrench',          route: 'detail',     variant: 'secondary' },
  'disponible':           { label: 'Despachar',    icon: 'truck',           route: 'detail',     variant: 'success' },
};

const TABS = [
  { id: 'todos',                label: 'Todos' },
  { id: 'inspeccion-pendiente', label: 'Inspección Pendiente' },
  { id: 'reparacion-pendiente', label: 'Reparación Pendiente' },
  { id: 'en-reparacion',        label: 'En Reparación' },
  { id: 'disponible',           label: 'Disponible' },
];

function Yard({ go }) {
  const D = window.TF_DATA;
  const [tab, setTab] = React.useState('todos');
  const [q, setQ] = React.useState('');
  const [onlyCritical, setOnlyCritical] = React.useState(false);
  const [sortDays, setSortDays] = React.useState(true);

  const inYard = D.containers;
  const counts = TABS.reduce((acc, t) => {
    acc[t.id] = t.id === 'todos' ? inYard.length : inYard.filter((c) => c.status === t.id).length;
    return acc;
  }, {});

  let rows = inYard
    .filter((c) => tab === 'todos' || c.status === tab)
    .filter((c) => !onlyCritical || c.daysInStatus >= 30)
    .filter((c) => {
      if (!q.trim()) return true;
      const s = q.toLowerCase();
      return c.code.toLowerCase().includes(s) || c.naviera.toLowerCase().includes(s) || c.ubicacion.toLowerCase().includes(s);
    });
  rows = rows.slice().sort((a, b) => sortDays ? b.daysInStatus - a.daysInStatus : a.code.localeCompare(b.code));

  const th = { textAlign: 'left', padding: '10px 14px', fontSize: '10px', fontFamily: 'var(--font-mono)', textTransform: 'uppercase', letterSpacing: '0.07em', color: 'var(--text-muted)', fontWeight: 600, borderBottom: '1px solid var(--border-subtle)', whiteSpace: 'nowrap' };
  const td = { padding: '12px 14px', borderBottom: '1px solid var(--border-subtle)', verticalAlign: 'middle' };

  return (
    <div>
      <SectionHeader
        eyebrow="Patio · Depósito Norte"
        title="Equipos en patio"
        subtitle={`${inYard.length} equipos en el depósito · ${counts['reparacion-pendiente']} con reparación pendiente`}
        actions={<>
          <Button variant="secondary" size="md" iconLeft={<Icon name="clipboard-check" />} onClick={() => go('inspection')}>Inspección</Button>
          <Button size="md" iconLeft={<Icon name="log-in" />} onClick={() => go('intake')}>Registrar ingreso</Button>
        </>}
      />
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 16 }}>
        {TABS.map((t) => {
          const active = tab === t.id;
          return (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{
                display: 'inline-flex', alignItems: 'center', gap: 8, cursor: 'pointer',
                padding: '7px 13px', borderRadius: 'var(--radius-pill)',
                fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)', fontWeight: active ? 600 : 400,
                border: '1px solid ' + (active ? 'var(--accent)' : 'var(--border-default)'),
                background: active ? 'var(--accent-quiet)' : 'var(--surface-raised)',
                color: active ? 'var(--blue-300)' : 'var(--text-secondary)',
                transition: 'all 120ms',
              }}>
              {t.label}
              <span style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 600,
                padding: '0 6px', borderRadius: 'var(--radius-pill)',
                background: active ? 'rgba(31,156,240,0.18)' : 'var(--steel-800)',
                color: active ? 'var(--blue-300)' : 'var(--text-muted)',
              }}>{counts[t.id]}</span>
            </button>
          );
        })}
      </div>
      <Card bodyFlush>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', borderBottom: '1px solid var(--border-subtle)' }}>
          <div style={{ width: 300, maxWidth: '45%' }}>
            <Input mono placeholder="Buscar código, naviera o posición…" icon={<Icon name="search" />} value={q} onChange={(e) => setQ(e.target.value)} />
          </div>
          <div style={{ flex: 1 }} />
          <Switch label="Solo +30 días" checked={onlyCritical} onChange={(e) => setOnlyCritical(e.target.checked)} />
          <Button variant="secondary" size="sm" iconLeft={<Icon name="arrow-up-down" />} onClick={() => setSortDays((v) => !v)}>
            {sortDays ? 'Antigüedad' : 'Código'}
          </Button>
        </div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              <th style={th}>Contenedor</th>
              <th style={th}>Tipo</th>
              <th style={th}>Posición</th>
              <th style={th}>Reparación</th>
              <th style={th}>Estado</th>
              <th style={th}>Antigüedad</th>
              <th style={{ ...th, textAlign: 'right' }}>Acción</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((c) => {
              const act = ACTION[c.status] || ACTION['inspeccion-pendiente'];
              return (
                <tr key={c.id} style={{ cursor: 'pointer', transition: 'background 120ms' }}
                    onClick={() => go('detail')}
                    onMouseEnter={(e) => e.currentTarget.style.background = 'var(--surface-hover)'}
                    onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                  <td style={td}>
                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-sm)', fontWeight: 600, letterSpacing: '0.03em' }}>{c.code}</div>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: 2 }}>{c.naviera}</div>
                  </td>
                  <td style={td}><span style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-sm)', color: 'var(--text-secondary)' }}>{c.tipo}</span></td>
                  <td style={td}><span style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-sm)', color: 'var(--text-secondary)' }}>{c.ubicacion}</span></td>
                  <td style={td}>{c.repairType ? <RepairTag type={c.repairType} /> : <span style={{ color: 'var(--text-muted)', fontSize: 'var(--text-sm)' }}>—</span>}</td>
                  <td style={td}><StatusBadge status={c.status} /></td>
                  <td style={td}><AgingIndicator days={c.daysInStatus} showFlag={false} /></td>
                  <td style={{ ...td, textAlign: 'right' }} onClick={(e) => e.stopPropagation()}>
                    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, justifyContent: 'flex-end' }}>
                      <Button variant={act.variant} size="sm" iconLeft={<Icon name={act.icon} />} onClick={() => go(act.route)}>{act.label}</Button>
                      <IconButton variant="ghost" size="sm" aria-label="Abrir" onClick={() => go('detail')}><Icon name="chevron-right" /></IconButton>
                    </div>
                  </td>
                </tr>
              );
            })}
            {rows.length === 0 && (
              <tr><td colSpan={7} style={{ ...td, textAlign: 'center', padding: '40px 14px', color: 'var(--text-muted)' }}>
                <Icon name="search-x" size={22} /><div style={{ marginTop: 8 }}>Sin equipos que coincidan con el filtro.</div>
              </td></tr>
            )}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

Object.assign(window, { Yard });
})();
</script>

    materials: ['Esquinero ISO', 'Perfil de marco', 'Soporte / cuna', 'Electrodos / gas'],
  },
  interior: {
    label: 'Reparación Interior', short: 'Interior', icon: 'package',
    desc: 'Revestimiento interno, válvulas y estanqueidad',
    tasks: ['Inspección y reparación de revestimiento interno', 'Limpieza y desgasificación del tanque', 'Reparación de válvula de fondo y descarga', 'Sellado de boca de hombre (manlid) y tapa', 'Prueba de estanqueidad interior'],
    materials: ['Revestimiento interno', 'Juntas / o-rings', 'Válvula de fondo', 'Sellador'],
  },
  pintura: {
    label: 'Pintura', short: 'Pintura', icon: 'paint-roller',
    desc: 'Tratamiento y repintado del marco y cilindro',
    tasks: ['Lijado y preparación del marco', 'Imprimación (primer) anticorrosiva', 'Pintura de acabado del marco', 'Repintado del cilindro / tanque', 'Control de espesor y secado'],
    materials: ['Imprimación anticorrosiva', 'Pintura de acabado', 'Disolvente', 'Discos de lija'],
  },
};

const ORDER = ['rotulacion', 'estructural', 'interior', 'pintura'];
const CYCLE = ['pendiente', 'curso', 'hecho'];
const STATE_META = {
  pendiente: { tone: 'neutral', label: 'Pendiente' },
  curso:     { tone: 'warn',    label: 'En curso' },
  hecho:     { tone: 'ok',      label: 'Hecho' },
};

function ProcessTab({ id, active, onClick }) {
  const p = PROCESSES[id];
  const [hover, setHover] = React.useState(false);
  const c = repColors[id];
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', alignItems: 'center', gap: 9, cursor: 'pointer',
        padding: '9px 14px', borderRadius: 'var(--radius-md)',
        fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)', fontWeight: 600,
        border: '1px solid ' + (active ? c : 'var(--border-default)'),
        background: active ? 'color-mix(in srgb, ' + c + ' 14%, transparent)' : hover ? 'var(--surface-hover)' : 'var(--surface-raised)',
        color: active ? 'var(--text-primary)' : 'var(--text-secondary)',
        transition: 'border-color 120ms, background 120ms, color 120ms', whiteSpace: 'nowrap',
      }}
    >
      <span style={{ width: 9, height: 9, borderRadius: 2, background: c, flex: 'none' }}></span>
      {p.short}
    </button>
  );
}

function TaskRowR({ label, state, onCycle, last }) {
  const meta = STATE_META[state];
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onCycle}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
        textAlign: 'left', cursor: 'pointer', border: 'none',
        background: hover ? 'var(--surface-hover)' : 'transparent',
        padding: '13px 8px', margin: '0 -8px', width: 'calc(100% + 16px)',
        borderBottom: last ? 'none' : '1px solid var(--border-subtle)',
        fontFamily: 'var(--font-body)', transition: 'background 120ms',
      }}
    >
      <span style={{ display: 'flex', alignItems: 'center', gap: 11 }}>
        <Icon name={state === 'hecho' ? 'check-circle-2' : state === 'curso' ? 'loader' : 'circle'} size={18}
          color={state === 'hecho' ? 'var(--green-400)' : state === 'curso' ? 'var(--amber-400)' : 'var(--text-muted)'} />
        <span style={{ fontSize: 'var(--text-base)', color: state === 'pendiente' ? 'var(--text-secondary)' : 'var(--text-primary)' }}>{label}</span>
      </span>
      <StatusBadge tone={meta.tone} dot>{meta.label}</StatusBadge>
    </button>
  );
}

function RepairForm({ go, container }) {
  const initProc = container && PROCESSES[container.repairType] ? container.repairType : 'rotulacion';
  const [active, setActive] = React.useState(initProc);
  const [states, setStates] = React.useState({});
  const [waiting, setWaiting] = React.useState(false);
  const [reqForm, setReqForm] = React.useState({ part: '', qty: '', urg: 'Normal', note: '' });
  const [requests, setRequests] = React.useState([
    { part: 'Junta de manlid 480 mm', qty: '2', urg: 'Alta', estado: 'En compras' },
  ]);

  React.useEffect(() => {
    if (container && PROCESSES[container.repairType]) setActive(container.repairType);
  }, [container]);

  const setReq = (k, v) => setReqForm((f) => ({ ...f, [k]: v }));
  const submitReq = () => {
    if (!reqForm.part.trim()) return;
    setRequests((r) => [{ part: reqForm.part.trim(), qty: reqForm.qty || '1', urg: reqForm.urg, estado: 'Solicitado' }, ...r]);
    setReqForm({ part: '', qty: '', urg: 'Normal', note: '' });
  };

  const p = PROCESSES[active];
  const c = repColors[active];
  const key = (i) => active + ':' + i;
  const getState = (i) => states[key(i)] || 'pendiente';
  const cycle = (i) => setStates((s) => {
    const cur = s[key(i)] || 'pendiente';
    const next = CYCLE[(CYCLE.indexOf(cur) + 1) % CYCLE.length];
    return { ...s, [key(i)]: next };
  });

  const done = p.tasks.filter((_, i) => getState(i) === 'hecho').length;
  const total = p.tasks.length;
  const pct = Math.round((done / total) * 100);
  const allDone = done === total;

  return (
    <div>
      <SectionHeader
        eyebrow="Reparación · Registro de trabajo"
        title={p.label}
        subtitle={container
          ? `${container.code} · ${container.tipo} · ${container.naviera} · posición ${container.ubicacion}`
          : "TGHU 785530-2 · T11 (40' Tank · 26 000 L) · Stolt · Orden #RP-1183 · posición B3-14"}
        actions={<StatusBadge status="en-reparacion" />}
      />
      <div style={{ display: 'flex', gap: 10, marginBottom: 22, flexWrap: 'wrap' }}>
        {ORDER.map((id) => <ProcessTab key={id} id={id} active={id === active} onClick={() => setActive(id)} />)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: '20px', alignItems: 'start' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
          <Card
            title={'Tareas · ' + p.short}
            actions={<span style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-xs)', color: 'var(--text-muted)' }}>{done}/{total} hechas</span>}
          >
            <div style={{ height: 6, borderRadius: 999, background: 'var(--bg-sunken)', overflow: 'hidden', marginBottom: 6 }}>
              <div style={{ height: '100%', width: pct + '%', background: c, borderRadius: 999, transition: 'width 280ms var(--ease-out)' }}></div>
            </div>
            <div style={{ fontSize: 'var(--text-xs)', color: 'var(--text-muted)', marginBottom: 6 }}>
              Tocá una tarea para avanzar su estado: Pendiente → En curso → Hecho.
            </div>
            <div style={{ display: 'flex', flexDirection: 'column' }}>
              {p.tasks.map((t, i) => (
                <TaskRowR key={i} label={t} state={getState(i)} onCycle={() => cycle(i)} last={i === total - 1} />
              ))}
            </div>
          </Card>
          <Card title="Materiales y repuestos utilizados">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {p.materials.map((m, i) => (
                  <span key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 7, padding: '6px 11px', borderRadius: 'var(--radius-md)', border: '1px solid var(--border-default)', background: 'var(--surface-raised)', fontSize: 'var(--text-sm)', color: 'var(--text-secondary)' }}>
                    <Icon name="package" size={14} color={c} />{m}
                  </span>
                ))}
              </div>
              <Input label="Agregar material / repuesto" placeholder="Descripción y cantidad…" icon={<Icon name="plus" />} />
            </div>
          </Card>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
          <Card title="Registro de trabajo">
            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
              <Select label="Responsable" placeholder="Asignar operario…" options={['M. Ferreyra', 'J. Cáceres', 'R. Pinto', 'D. Sosa', 'Cuadrilla A', 'Cuadrilla B']} />
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <Input label="Inicio" mono placeholder="2026-06-23" icon={<Icon name="calendar" />} />
                <Input label="Horas-hombre" mono placeholder="0.0" />
              </div>
              <Select label="Prioridad" options={['Normal', 'Alta', 'Urgente']} />
              <Input label="Observaciones del trabajo" placeholder="Detalle de lo realizado, hallazgos…" />
            </div>
          </Card>
          <Card title="Espera de repuesto">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 'var(--text-base)' }}>¿En espera de repuesto?</div>
                <div style={{ fontSize: 'var(--text-xs)', color: 'var(--text-muted)', marginTop: 3 }}>Detiene el avance y se cuenta la antigüedad</div>
              </div>
              <Switch checked={waiting} onChange={(e) => setWaiting(e.target.checked)} label={waiting ? 'Sí' : 'No'} />
            </div>
            {waiting && (
              <div style={{ marginTop: 14, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <Input label="Repuesto" placeholder="Válvula de fondo" />
                <Input label="ETA" mono placeholder="2026-07-02" />
              </div>
            )}
          </Card>
          <Card
            title={<span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="package-plus" size={18} color={'var(--amber-400)'} />Solicitar repuesto</span>}
            actions={requests.length > 0 ? <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', background: 'var(--surface-raised)', padding: '2px 9px', borderRadius: 'var(--radius-pill)' }}>{requests.length}</span> : null}
          >
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <Input label="Repuesto / parte" placeholder='Ej. Válvula de fondo 3"' icon={<Icon name="package" />}
                value={reqForm.part} onChange={(e) => setReq('part', e.target.value)} />
              <div style={{ display: 'grid', gridTemplateColumns: '90px 1fr', gap: 12 }}>
                <Input label="Cantidad" mono placeholder="1" value={reqForm.qty} onChange={(e) => setReq('qty', e.target.value)} />
                <Select label="Urgencia" options={['Normal', 'Alta', 'Crítica']} value={reqForm.urg} onChange={(e) => setReq('urg', e.target.value)} />
              </div>
              <Input label="Nota para compras" placeholder="Especificaciones, medidas, proveedor…"
                value={reqForm.note} onChange={(e) => setReq('note', e.target.value)} />
              <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                <Button variant="secondary" size="sm" iconLeft={<Icon name="send" />} disabled={!reqForm.part.trim()} onClick={submitReq}>Enviar solicitud</Button>
              </div>
            </div>
            {requests.length > 0 && (
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--border-subtle)', display: 'flex', flexDirection: 'column', gap: 8 }}>
                {requests.map((r, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <Icon name="package" size={15} color={'var(--text-muted)'} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 'var(--text-sm)', color: 'var(--text-primary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.part}</div>
                      <div style={{ fontSize: '11px', color: 'var(--text-muted)', fontFamily: 'var(--font-mono)' }}>x{r.qty} · {r.urg}</div>
                    </div>
                    <StatusBadge tone={r.estado === 'Solicitado' ? 'warn' : 'neutral'} dot>{r.estado}</StatusBadge>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 20 }}>
        <Button variant="ghost" onClick={() => go('detail')}>Cancelar</Button>
        <Button variant="secondary" iconLeft={<Icon name="save" />} onClick={() => go('detail')}>Guardar avance</Button>
        <Button variant="success" iconLeft={<Icon name="check" />} disabled={!allDone} onClick={() => go('detail')}>
          {allDone ? 'Finalizar ' + p.short.toLowerCase() : 'Completar tareas para finalizar'}
        </Button>
      </div>
    </div>
  );
}

Object.assign(window, { RepairForm });
})();
</script>

<!-- ContainerDetail -->
<script type="text/babel" data-presets="react">
;(function(){
const { Card, SectionHeader, Button, StatusBadge, RepairTag, AgingIndicator, IconButton } = window.TankFlowDesignSystem_32ec47;

function TimelineRow({ ev, last }) {
  const color = ev.done ? 'var(--green-500)' : ev.active ? 'var(--amber-500)' : 'var(--steel-600)';
  return (
    <div style={{ display: 'flex', gap: 14 }}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', flex: 'none' }}>
        <div style={{
          width: 32, height: 32, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: ev.done ? 'rgba(45,212,160,0.14)' : ev.active ? 'rgba(245,166,35,0.16)' : 'var(--surface-raised)',
          border: '1px solid ' + (ev.active ? 'var(--amber-500)' : 'transparent'),
        }}>
          <Icon name={ev.icon} size={16} style={{ color }} />
        </div>
        {!last && <div style={{ width: 2, flex: 1, minHeight: 26, background: ev.done ? 'var(--green-500)' : 'var(--steel-700)', opacity: ev.done ? 0.5 : 1 }}></div>}
      </div>
      <div style={{ paddingBottom: last ? 0 : 18, flex: 1 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontWeight: 600, fontSize: 'var(--text-base)', color: ev.done || ev.active ? 'var(--text-primary)' : 'var(--text-muted)' }}>{ev.title}</span>
          {ev.active && <StatusBadge tone="warn" dot>En curso</StatusBadge>}
        </div>
        <div style={{ display: 'flex', gap: 12, marginTop: 3, fontSize: 'var(--text-xs)', color: 'var(--text-muted)', fontFamily: 'var(--font-mono)' }}>
          <span>{ev.time}</span>{ev.who && <span>· {ev.who}</span>}
        </div>
        {ev.note && <div style={{ fontSize: 'var(--text-sm)', color: 'var(--text-secondary)', marginTop: 5 }}>{ev.note}</div>}
      </div>
    </div>
  );
}

function InfoRow({ k, v, mono }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12, padding: '9px 0', borderBottom: '1px solid var(--border-subtle)' }}>
      <span style={{ fontSize: 'var(--text-sm)', color: 'var(--text-muted)' }}>{k}</span>
      <span style={{ fontSize: 'var(--text-sm)', fontWeight: 500, fontFamily: mono ? 'var(--font-mono)' : 'inherit', textAlign: 'right' }}>{v}</span>
    </div>
  );
}

function ContainerDetail({ go }) {
  const D = window.TF_DATA;
  return (
    <div>
      <button onClick={() => go('dashboard')} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontFamily: 'var(--font-body)', fontSize: 'var(--text-sm)', marginBottom: 14, padding: 0 }}>
        <Icon name="arrow-left" size={15} /> Volver al panel
      </button>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, marginBottom: 22 }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <h1 style={{ margin: 0, fontFamily: 'var(--font-mono)', fontSize: 'var(--text-3xl)', fontWeight: 600, letterSpacing: '0.02em' }}>MSKU 204418-7</h1>
            <StatusBadge status="reparacion-pendiente" />
          </div>
          <div style={{ color: 'var(--text-muted)', marginTop: 6, fontSize: 'var(--text-sm)' }}>40HC · Maersk · Orden de reparación #RP-1183 · posición B3-14</div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <Button variant="secondary" iconLeft={<Icon name="package-search" />}>Repuesto recibido</Button>
          <Button variant="success" iconLeft={<Icon name="check" />}>Finalizar reparación</Button>
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '13px 16px', borderRadius: 'var(--radius-md)', background: 'rgba(244,80,62,0.10)', border: '1px solid rgba(244,80,62,0.32)', marginBottom: 22 }}>
        <Icon name="clock-alert" size={20} color={'var(--red-400)'} style={{ flex: 'none' }} />
        <div style={{ flex: 1, fontSize: 'var(--text-sm)' }}>
          <strong style={{ color: 'var(--red-400)' }}>31 días en Reparación Pendiente sin avanzar.</strong> <span style={{ color: 'var(--text-secondary)' }}>Reparación detenida esperando repuesto estructural (ETA 21 jun). Supera el umbral de 30 días.</span>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: '20px', alignItems: 'start' }}>
        <Card title="Tracking del equipo">
          <div style={{ paddingTop: 4 }}>
            {D.timeline.map((ev, i) => <TimelineRow key={i} ev={ev} last={i === D.timeline.length - 1} />)}
          </div>
        </Card>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
          <Card title="Reparación">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <RepairTag type="estructural" />
                <RepairTag type="pintura" />
              </div>
              <AgingIndicator days={31} />
            </div>
          </Card>
          <Card title="Datos del equipo">
            <div>
              <InfoRow k="Código ISO" v="MSKU 204418-7" mono />
              <InfoRow k="Tipo" v="40HC" />
              <InfoRow k="Naviera" v="Maersk" />
              <InfoRow k="Ingreso (gate-in)" v="2026-06-12 08:41" mono />
              <InfoRow k="ETA repuesto" v="2026-06-21" mono />
              <InfoRow k="Inspector" v="J. Cáceres" />
              <InfoRow k="Posición" v="B3-14" mono />
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { ContainerDetail });
})();
</script>

<!-- App Entry -->
<script type="text/babel" data-presets="react">
function App() {
  const [route, setRoute] = React.useState('dashboard');
  const [ctx, setCtx] = React.useState(null);
  const go = (r, payload) => { setRoute(r); if (payload !== undefined) setCtx(payload); };

  let screen;
  switch (route) {
    case 'intake':     screen = <Intake go={go} />; break;
    case 'tasks':      screen = <MyTasks go={go} />; break;
    case 'yard':       screen = <Yard go={go} />; break;
    case 'inspection': screen = <Inspection go={go} />; break;
    case 'repairs':    screen = <RepairForm go={go} container={ctx} />; break;
    case 'detail':     screen = <ContainerDetail go={go} />; break;
    default:           screen = <Dashboard go={go} />;
  }
  return <AppShell route={route} go={go}>{screen}</AppShell>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
